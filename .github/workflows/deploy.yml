name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/configure-pages@v5
      - run: npm ci
      - run: npm run build
        env:
          # Project-page subpath (https://<org>.github.io/landing-page/). Drives
          # both next.config basePath and lib/asset.ts media prefixing.
          # Clear this (or delete the line) if you move to a custom domain.
          NEXT_PUBLIC_BASE_PATH: /landing-page
          NEXT_PUBLIC_WEB3FORMS_KEY_RESTAURANT: ${{ secrets.WEB3FORMS_KEY_RESTAURANT }}
          NEXT_PUBLIC_WEB3FORMS_KEY_DINER: ${{ secrets.WEB3FORMS_KEY_DINER }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
